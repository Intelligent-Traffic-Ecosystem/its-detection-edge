version: "2.1"

services:
  edge-camera-1:
    build: .
    restart: always
    privileged: true
    # For RTSP-only cameras, remove the devices section.
    devices:
      - "/dev/video0:/dev/video0"
    volumes:
      - edge-data:/data
    environment:
      - CAMERA_ID=cam_01
      - LANES_CONFIG_PATH=config/lanes.json
      - BUFFER_DB_PATH=/data/cam_01/offline_buffer.db
      - API_PORT=8001
    ports:
      - "8001:8001"

  edge-camera-2:
    build: .
    restart: always
    privileged: true
    # For RTSP-only cameras, remove the devices section.
    devices:
      - "/dev/video1:/dev/video1"
    volumes:
      - edge-data:/data
    environment:
      - CAMERA_ID=cam_02
      - LANES_CONFIG_PATH=config/lanes.json
      - BUFFER_DB_PATH=/data/cam_02/offline_buffer.db
      - API_PORT=8002
    ports:
      - "8002:8002"

volumes:
  edge-data:
